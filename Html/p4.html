<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD Store</title>
    <link rel="stylesheet" href="s4.css">
</head>
<body>

    <header>
        <div class="logo">AD store</div>
        <input type="text" placeholder="Search for products..." class="search-bar">
        <button class="cart-button">Cart</button>
    </header>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Categories</a></li>
            <li><a href="#">Deals</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section class="products">
            <div class="product">
                <img src="https://cdn1.smartprix.com/rx-iZ7GMvOb4-w1200-h1200/Z7GMvOb4.jpg" alt="Laptop">
                <h2>Laptop</h2>
                <p>₹145000</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="https://th.bing.com/th/id/OIP.jU8uUR9jpWmaSKCbAQ7TzQHaIO?w=540&h=600&rs=1&pid=ImgDetMain "width=70% alt="Smartphone">
                <h2>Smartphone</h2>
                <p>₹99000</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="https://th.bing.com/th/id/R.8abc3ca5650aeab7a7d34e4b0e21c183?rik=ffJnMO8UT6qGiQ&riu=http%3a%2f%2fecx.images-amazon.com%2fimages%2fI%2f61FYRpjo7XL.jpg&ehk=a7xvWth9D154BZJY8r0R3Qvb16OH%2fQ8BsGfnmnQTcEY%3d&risl=&pid=ImgRaw&r=0"width=80% alt="Headphones">
                <h2>Headphones</h2>
                <p>₹25000</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="https://www.xitetech.com/uploads/original/2024/07/Samsung-Galaxy-Watch-Ultra.jpg"width=150% alt="Smartwatch">
                <h2>Smartwatch</h2>
                <p>₹55000</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="https://th.bing.com/th/id/R.613a8f40cb2958a6d5884c5848e034f8?rik=3R9Qxvw6jT65vA&riu=http%3a%2f%2fwww.bhphotovideo.com%2fimages%2fimages2500x2500%2fcanon_1263c005_eos_80d_dslr_camera_1225876.jpg&ehk=q7iUuM1osOg0j72aJ9G%2bAHfczWOH44VRoHxTAafiWjA%3d&risl=&pid=ImgRaw&r=0"width=90% alt="Camera">
                <h2>Camera</h2>
                <p>₹85000</p>
                <button>Add to Cart</button>
            </div>
        </section>
    </main>
    <footer>
        Made with &hearts; by Amazon <br>
        &#169; 1996-2023, Amazon.com, Inc. or its affilates
    </footer>
</body>
</html>
